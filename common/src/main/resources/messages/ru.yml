# \u00BB это " (двойной >>), ANSI и UTF-8 интерпретируют это по-разному... вы можете даже увидеть "?" из-за этого
prefix: "&bGrim &8\u00BB"

alerts-enabled: "%prefix% &fОповещения включены"
alerts-disabled: "%prefix% &fОповещения отключены"
verbose-enabled: "%prefix% &fVerbose enabled"
verbose-disabled: "%prefix% &fVerbose disabled"
brands-enabled: "%prefix% &fBrands enabled"
brands-disabled: "%prefix% &fBrands disabled"
client-brand-format: "%prefix% &f%player% присоединился, используя %brand%"
console-specify-target: "%prefix% &cВы должны указать цель в качестве консоли!"
reloading: "%prefix% &7Reloading config..."
reloaded: "%prefix% &fConfig has been reloaded."
reload-failed: "%prefix% &cFailed to reload config."
player-not-found: "%prefix% &cИгрок исключен или находится вне сети!"
player-not-this-server: "%prefix% &cИгрок не находится на этом сервере!"
sender-not-found: "%prefix% &cВы не можете использовать эту команду, если у вас есть исключение!"
spectate-return: "<click:run_command:/grim stopspectating><hover:show_text:\"/grim stopspectating\">\n%prefix% &fНажмите здесь, чтобы вернуться на предыдущее место\n</hover></click>"
cannot-spectate-return: "%prefix% &cВы можете сделать это только после наблюдения за игроком"
cannot-run-on-self: "%prefix% &cВы не можете использовать эту команду на себе!"
upload-log: "%prefix% &fОтладка была загружена на: %url%"
upload-log-start: "%prefix% &fЗагрузка журнала... пожалуйста, подождите"
upload-log-not-found: "%prefix% &cНевозможно найти этот журнал"
upload-log-upload-failure: "%prefix% &cЧто-то пошло не так при загрузке этого журнала, смотрите консоль для получения дополнительной информации"
disconnect:
    timeout: "<lang:disconnect.timeout>"
    closed: "<lang:disconnect.closed>"
    error: "<red>An error occurred whilst processing packets. Please contact the administrators."
    blacklisted-forge: "<red>Your forge version is blacklisted due to inbuilt reach hacks.<newline><gold>Versions affected: 1.18.2-1.19.3<newline><newline><red>Please see https://github.com/MinecraftForge/MinecraftForge/issues/9309."
run-as-player: "%prefix% &cЭту команду могут использовать только игроки!"
run-as-player-or-console: "%prefix% &cЭту команду могут использовать только игроки или консоль!"
webhook-not-enabled: "Discord webhooks are not enabled!"
webhook-test-message: "test message"
webhook-test-succeeded: "Discord webhook test succeeded!"
webhook-test-failed: "Discord webhook test failed!"

# Допустимые заполнители:
# %prefix%
# %player%
# %check_name%
# %description%
# %experimental%
# %vl% - нарушения
# %verbose% - дополнительная информация от проверки, например, смещения, не все проверки добавляют информацию.
alerts-format: "%prefix% &f%player% &bпровалил <hover:show_text:\"&b%check_name%%experimental%\n&8Описание: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
alerts-format-proxy: "%prefix% &f[&cproxy&f] &f%player% &bпровалил <hover:show_text:\"&b%check_name%%experimental%\n&8Описание: &f%description%\">&f%check_name%%experimental%</hover> &f(x&c%vl%&f) &7%verbose%"
experimental-symbol: "*"

profile:
    - "&7======================"
    - "%prefix% &bПрофиль для &f%player%"
    - "&bПинг: &f%ping%"
    - "&bВерсия: &f%version%"
    - "&bБренд клиента: &f%brand%"
    - "&bГоризонтальная чувствительность: &f%h_sensitivity%%"
    - "&bВертикальная чувствительность: &f%v_sensitivity%%"
    - "&bFastMath Включено: &f%fast_math%"
    - "&7======================"
help:
    - "&7======================"
    - "/grim alerts &f- &7Включить/выключить оповещения"
    - "/grim brands &f- &7Toggle brands"
    - "/grim profile <игрок> &f- &7Просмотреть информацию об игроке"
    - "/grim help &f- &7Просмотреть это сообщение помощи"
    - "/grim debug <игрок> &f- &7Вывод прогноза разработчика"
    - "/grim perf &f- &7Вывод производительности Grim для разработчиков"
    - "/grim reload &f- &7Перезагружает конфигурацию"
    - "/grim spectate <игрок> &f- &7Наблюдать за игроком"
    - "/grim verbose &f- &7Показывает все флаги без буферов"
    - "/grim log [0-255] &f- &7Загружает журнал отладки для флагов предсказания"
    - "/grim history <player> &f- &7Список сессий (новые сверху)"
    - "/grim history <player> page <N> &f- &7Перейти к странице N списка сессий"
    - "/grim history <player> session <N|latest> [-d] [-v] &f- &7Детали сессии (свежие нарушения сверху)"
    - "/grim history <player> session <N|latest> page <N> [-d] [-v] &f- &7Детали сессии, страница N нарушений"
    - "&7======================"

# === /grim history ===
# UI истории на основе сессий. Все строки ниже являются настраиваемыми
# шаблонами MiniMessage. Ховеры по умолчанию находятся в inline-тегах
# <hover:show_text:'...'> и ключах hover-фрагментов ниже; удалите inline-hover,
# чтобы использовать fallback рендерера.

grim-history-load-failure: "%prefix% &cНе удалось загрузить подсистему истории! Проверьте консоль сервера на наличие ошибок."
grim-history-disabled: "%prefix% &cПодсистема истории отключена!"
grim-history-failed: "%prefix% &cНе удалось загрузить историю: &7%error%"
grim-history-unknown-player: "%prefix% &cНеизвестный игрок: &f%player%"
grim-history-no-sessions: "%prefix% &7Нет истории сессий для &f%player%&7."
grim-history-session-not-found: "%prefix% &cСессия &f%ordinal%&c не найдена для &f%player%&c."

# Список сессий — допустимые плейсхолдеры: %prefix% %player% %page% %max_pages%
grim-history-header: "%prefix% &bИстория сессий для &f%player% &8[&f%page%&7/&f%max_pages%&8]"
# Сводная строка одной сессии — допустимые плейсхолдеры:
#   %prefix% %player% %ordinal% %grim_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %crashed_marker% %session_uuid% %detail_command%
# %crashed_marker% разворачивается в grim-history-crashed-marker для сессий,
# чьё соединение оборвалось без штатного закрытия (краш сервера, kill -9,
# RST канала, не вызвавший UserDisconnectEvent). Для активных или штатно
# закрытых сессий — пустая строка.
grim-history-session: "<hover:show_text:'&bСессия &7%session_uuid%<newline>&7Нажмите или выполните &e%detail_command%<newline>&7чтобы посмотреть детали сессии.'>%prefix% &8[&b%grim_version%&8] &8[&b%server_name%&8] &8[&b%client_version%&8] &bСессия &f%ordinal%&b, длительность &f%duration%&b, нарушений &c%violations%&b &8[&c%unique_checks%&8]%crashed_marker% &8(&7%timeago% назад&8)</hover>"

# Встроенный маркер, подставляемый в %crashed_marker% для сессий с
# closed_at == last_activity (то есть проставленных при следующем запуске
# crash-sweep'ом, а не путём штатного дисконнекта). Содержит ведущий
# пробел: при наличии маркер читается естественно, при отсутствии чисто
# исчезает.
grim-history-crashed-marker: " &8(&cкраш&8)"

# Детали сессии — допустимые плейсхолдеры:
#   %prefix% %player% %ordinal% %grim_version% %server_name%
#   %client_version% %client_brand% %duration% %timeago%
#   %violations% %unique_checks% %bucket_size%
grim-history-detail-header: "%prefix% &bДетали сессии &f%ordinal% &bигрока &f%player%&b:"
grim-history-detail-meta1: "%prefix% &bGrim: &f%grim_version%&b, сервер: &f%server_name%&b, длительность: &f%duration%&b, дата: &7%timeago% назад"
grim-history-detail-meta2: "%prefix% &bКлиент: &f%client_version%&b, бренд: &f%client_brand%"
grim-history-detail-violations-header: "%prefix% &bНарушения: &8(всего %violations%, уникальных %unique_checks%)"
grim-history-detail-empty: "%prefix% &7- (нет)"
# Сгруппированная строка (по умолчанию) — допустимые плейсхолдеры: %prefix% %offset% %checks_list%
#   %bucket_start% %bucket_end% %bucket_hover_entries%
#   %checks_list% строится склейкой записей grim-history-check-count через ", "
grim-history-detail-group: "<hover:show_text:'&bНарушения за &f%bucket_start%–%bucket_end%&b:%bucket_hover_entries%'>%prefix% &7- %checks_list% &8(&b%offset%&8)</hover>"
grim-history-detail-group-hover: "&bНарушения за &f%bucket_start%–%bucket_end%&b:%bucket_hover_entries%"
grim-history-detail-group-hover-entry: "<newline>&8  %offset% &b%check%%description%%verbose%"
grim-history-hover-description: " — &f%description%"
grim-history-detail-group-hover-verbose: " — &7%verbose%"
# Одиночная строка нарушения (--detailed) — допустимые плейсхолдеры:
#   %prefix% %offset% %check% %description% %vl% %verbose%
grim-history-detail-entry: "%prefix% &7- &f%check% &8(&b%offset%&8)&7 %verbose%"
grim-history-detail-entry-hover: "&b%check%%description%<newline>&8@ %offset% — vl %vl%%verbose%"
grim-history-detail-entry-hover-verbose: "<newline>&7%verbose%"
# Внутренний формат каждой записи в %checks_list% — допустимые плейсхолдеры: %check_name% %count%
grim-history-check-count: "&f%check_name%&7 x&c%count%"

# Маркеры схемы — см. шапку config.yml.
config-flavor: V2
config-version: 2
